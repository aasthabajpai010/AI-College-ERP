<rect x="150" y="250" width="35" height="50" rx="2" fill="#A8434E"/>
<rect x="200" y="250" width="35" height="50" rx="2" fill="#A8434E"/>
<rect x="245" y="250" width="35" height="50" rx="2" fill="#A8434E"/>
<rect x="295" y="250" width="35" height="50" rx="2" fill="#A8434E"/>

<rect x="220" y="310" width="40" height="50" rx="2" fill="#1B2333"/>

