<svg width="480" height="480" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Campus illustration</title>
<desc>A flat illustration of a college campus building with a graduate figure and a book, in navy and maroon tones.</desc>

<circle cx="240" cy="240" r="200" fill="#242E42"/>
<circle cx="240" cy="240" r="150" fill="#2A3547"/>

<rect x="120" y="220" width="240" height="140" rx="4" fill="#F1EFE8"/>
<polygon points="110,220 240,150 370,220" fill="#8C2F39"/>
